<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <script src="auth-guard.js"></script>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Catálogo — A&M Importaciones</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/amexportsp-byte/data_imagen/main/logo1.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#C9963A;--gold-l:#E8B96A;--gold-d:#9A7020;
      --black:#0D0D0D;--cream:#F8F3EA;--cream2:#EDE6D6;
      --text:#1A1A1A;--gray:#666;
    }
    body{font-family:'Outfit',sans-serif;background:#E0DAD0;color:var(--text)}

    /* ── ACTION BAR ── */
    .action-bar{
      position:sticky;top:0;z-index:200;
      background:var(--black);
      padding:12px 28px;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:2px solid var(--gold);
    }
    .ab-left{display:flex;align-items:center;gap:12px}
    .ab-logo{height:34px;object-fit:contain}
    .ab-title{color:#fff;font-size:15px;font-weight:700}
    .ab-sub{color:rgba(255,255,255,.45);font-size:11px}
    .ab-right{display:flex;gap:8px;align-items:center}
    .btn{display:flex;align-items:center;gap:7px;padding:9px 20px;border-radius:8px;
      font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;
      cursor:pointer;border:none;transition:opacity .15s}
    .btn:hover{opacity:.82}
    .btn-gold{background:linear-gradient(135deg,var(--gold-l),var(--gold-d));color:#fff}
    .btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.22)}

    /* ── DOCUMENTO ── */
    .doc{max-width:1100px;margin:28px auto;background:var(--cream);
      overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.22)}

    /* HEADER */
    .doc-header{display:grid;grid-template-columns:260px 1fr;min-height:190px}
    .dh-left{
      background:var(--black);padding:32px 28px;
      display:flex;flex-direction:column;justify-content:center;
      position:relative;
    }
    .dh-left::after{
      content:'';position:absolute;right:-24px;top:0;bottom:0;width:48px;
      background:var(--black);
      clip-path:polygon(0 0,50% 0,50% 100%,0 100%);
    }
    .dh-logo{height:52px;object-fit:contain;margin-bottom:10px}
    .dh-name{color:#fff;font-size:18px;font-weight:800}
    .dh-tag{color:rgba(255,255,255,.45);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
    .dh-bar{width:44px;height:2px;background:var(--gold);margin:10px 0}

    .dh-right{
      background:var(--cream);padding:32px 36px 32px 52px;
      display:flex;flex-direction:column;justify-content:center;
    }
    .dh-eyebrow{
      font-size:10px;font-weight:700;letter-spacing:3px;
      color:var(--gold-d);text-transform:uppercase;margin-bottom:6px;
    }
    .dh-title{font-size:44px;font-weight:900;color:var(--black);line-height:1;letter-spacing:-1px}
    .dh-title span{color:var(--gold)}
    .dh-subtitle{
      font-family:'Playfair Display',serif;font-style:italic;
      color:var(--gold);font-size:15px;margin-top:7px;
    }
    .dh-badges{display:flex;gap:18px;margin-top:18px;flex-wrap:wrap}
    .dh-badge{display:flex;align-items:center;gap:8px;font-size:10px;
      font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.4px}
    .dh-badge-ico{
      width:30px;height:30px;border-radius:50%;
      background:var(--black);color:var(--gold);
      display:flex;align-items:center;justify-content:center;font-size:14px;
      flex-shrink:0;
    }

    /* INFO STRIP */
    .doc-strip{
      background:var(--black);padding:9px 36px;
      display:flex;align-items:center;
      border-top:1px solid rgba(201,150,58,.25);
    }
    .strip-item{
      flex:1;text-align:center;padding:4px 12px;
      border-right:1px solid rgba(255,255,255,.1);
      font-size:10.5px;color:rgba(255,255,255,.5);
    }
    .strip-item:last-child{border-right:none}
    .strip-item strong{color:var(--gold);display:block;font-size:11px}

    /* PRODUCTS AREA */
    .products-area{padding:28px 32px 8px}

    /* Category header */
    .cat-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;margin-top:24px}
    .cat-row:first-child{margin-top:0}
    .cat-row-name{
      display:flex;align-items:center;gap:8px;
      font-size:12px;font-weight:800;letter-spacing:2px;
      color:var(--black);text-transform:uppercase;white-space:nowrap;
    }
    .cat-ico{
      width:26px;height:26px;border-radius:50%;
      background:var(--black);color:var(--gold);
      display:flex;align-items:center;justify-content:center;font-size:12px;
      flex-shrink:0;
    }
    .cat-count{
      font-size:10px;font-weight:600;color:var(--gold);
      background:rgba(201,150,58,.1);border:1px solid rgba(201,150,58,.28);
      padding:2px 8px;border-radius:20px;white-space:nowrap;
    }
    .cat-line{flex:1;height:1px;background:linear-gradient(to right,rgba(201,150,58,.4),transparent)}

    /* PRODUCT GRID */
    .pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}

    /* PRODUCT CARD */
    .pcard{
      background:#fff;border-radius:12px;
      border:1.5px solid rgba(201,150,58,.2);
      overflow:visible;display:flex;flex-direction:column;
      position:relative;box-shadow:0 2px 8px rgba(0,0,0,.06);
      cursor:pointer;transition:box-shadow .15s,transform .15s;
    }
    .pcard:hover{box-shadow:0 6px 20px rgba(201,150,58,.22);transform:translateY(-2px)}

    .pcard-cat{
      position:absolute;top:-1px;left:10px;
      background:var(--black);color:var(--gold);
      font-size:8.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
      padding:3px 9px 3px 7px;border-radius:0 0 7px 7px;
      display:flex;align-items:center;gap:4px;z-index:2;
    }
    .pcard-cat .ico{font-size:11px}

    .pcard-img{
      height:120px;background:var(--cream2);
      border-radius:10px 10px 0 0;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      margin-top:20px;
    }
    .pcard-img img{width:100%;height:100%;object-fit:contain;padding:8px}
    .pcard-img .ph{font-size:42px;opacity:.2}

    .pcard-body{padding:10px 11px 12px;flex:1;display:flex;flex-direction:column;gap:3px}
    .pcard-name{
      font-size:11.5px;font-weight:700;color:var(--black);line-height:1.3;
      display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .pcard-desc{
      font-size:10px;color:var(--gray);line-height:1.35;
      display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .pcard-sku{font-size:9px;color:#bbb}
    .pcard-bottom{
      display:flex;align-items:center;justify-content:space-between;
      margin-top:auto;padding-top:8px;
      border-top:1px solid rgba(0,0,0,.05);
    }
    .pcard-price{
      background:var(--black);color:var(--gold-l);
      font-size:13.5px;font-weight:800;padding:4px 11px;border-radius:20px;
    }
    .pcard-btn{
      width:30px;height:30px;border-radius:50%;
      background:linear-gradient(135deg,var(--gold-l),var(--gold-d));
      border:none;cursor:pointer;font-size:13px;
      display:flex;align-items:center;justify-content:center;
      transition:transform .12s;flex-shrink:0;
    }
    .pcard-btn:hover{transform:scale(1.12)}

    /* CATALOG FOOTER */
    .doc-features{
      background:var(--black);padding:18px 32px;
      display:grid;grid-template-columns:repeat(4,1fr);
      border-top:2px solid rgba(201,150,58,.25);
    }
    .feat{text-align:center;padding:8px 10px;border-right:1px solid rgba(255,255,255,.08)}
    .feat:last-child{border-right:none}
    .feat-ico{font-size:22px;display:block;margin-bottom:5px}
    .feat-title{color:var(--gold);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;display:block}
    .feat-desc{color:rgba(255,255,255,.4);font-size:9.5px;margin-top:3px;line-height:1.3}

    .doc-contact{
      background:#080808;padding:14px 32px;
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
    }
    .contact-list{display:flex;flex-direction:column;gap:3px}
    .contact-item{color:rgba(255,255,255,.4);font-size:10px;display:flex;align-items:center;gap:6px}
    .contact-item strong{color:var(--gold)}
    .social-row{display:flex;gap:7px;align-items:center}
    .sico{
      width:26px;height:26px;border-radius:50%;
      border:1px solid rgba(201,150,58,.35);
      color:var(--gold);font-size:11px;
      display:flex;align-items:center;justify-content:center;
      font-weight:700;font-family:'Outfit',sans-serif;
    }
    .social-handle{color:rgba(255,255,255,.35);font-size:10px;margin-left:4px}
    .brand-block{text-align:right}
    .brand-name{color:var(--gold);font-size:14px;font-weight:800}
    .brand-slogan{color:rgba(255,255,255,.35);font-size:10px;font-style:italic}

    /* ── SINGLE PRODUCT MODAL ── */
    .s-modal{
      display:none;position:fixed;inset:0;z-index:9999;
      background:rgba(0,0,0,.78);
      align-items:center;justify-content:center;
    }
    .s-modal.open{display:flex}
    .s-wrap{position:relative}

    .s-actions{
      position:absolute;top:-46px;right:0;
      display:flex;gap:8px;
    }
    .s-btn{
      padding:8px 16px;border-radius:7px;
      font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;
      cursor:pointer;border:none;
    }
    .s-btn-print{background:linear-gradient(135deg,var(--gold-l),var(--gold-d));color:#fff}
    .s-btn-close{background:rgba(255,255,255,.18);color:#fff}

    /* The card itself — square proportions like image 3 */
    .s-card{
      width:660px;height:660px;
      position:relative;overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,.55);
    }

    /* Cream marble background */
    .s-bg{
      position:absolute;inset:0;z-index:0;
      background:
        radial-gradient(ellipse at 72% 18%,rgba(218,208,186,.7) 0%,transparent 48%),
        radial-gradient(ellipse at 18% 82%,rgba(228,218,196,.5) 0%,transparent 38%),
        linear-gradient(140deg,#F6F0E4 0%,#ECE4D2 45%,#F2EAD6 100%);
    }

    /* Gold wavy lines (decorative arcs) */
    .s-arc{
      position:absolute;border-radius:50%;z-index:1;
      border:1px solid rgba(201,150,58,.18);
    }
    .s-arc-1{right:-55px;top:50%;transform:translateY(-50%);width:190px;height:380px}
    .s-arc-2{right:-75px;top:50%;transform:translateY(-50%);width:240px;height:480px}
    .s-arc-3{left:-70px;bottom:55px;width:230px;height:280px}
    .s-arc-4{left:-100px;bottom:35px;width:300px;height:360px}

    /* top-left black corner */
    .s-corner{
      position:absolute;top:0;left:0;z-index:4;
      width:210px;height:188px;
      background:var(--black);
      border-radius:0 0 110px 0;
      padding:22px 26px;
      display:flex;flex-direction:column;justify-content:center;
    }
    .s-corner-logo{height:46px;object-fit:contain}
    .s-corner-name{color:#fff;font-size:12px;font-weight:800;margin-top:8px}
    .s-corner-tag{color:rgba(255,255,255,.4);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

    /* top-right icons */
    .s-top-icons{
      position:absolute;top:26px;right:32px;z-index:5;
      display:flex;gap:14px;align-items:center;
    }
    .s-top-ico{font-size:19px;color:var(--gold);opacity:.8}
    .s-top-sep{width:1px;height:18px;background:rgba(201,150,58,.3)}

    /* decorative diamond */
    .s-diamond{
      position:absolute;z-index:3;
      color:var(--gold);font-size:9px;opacity:.5;
    }

    /* product content */
    .s-content{
      position:absolute;z-index:5;
      top:160px;left:50%;transform:translateX(-50%);
      width:78%;display:flex;flex-direction:column;align-items:center;
      text-align:center;
    }
    .s-cat-pill{
      display:inline-flex;align-items:center;gap:5px;
      background:rgba(201,150,58,.12);border:1px solid rgba(201,150,58,.3);
      color:var(--gold-d);font-size:9.5px;font-weight:700;
      padding:3px 11px;border-radius:20px;margin-bottom:10px;
      text-transform:uppercase;letter-spacing:.5px;
    }
    .s-img-wrap{
      width:240px;height:200px;
      display:flex;align-items:center;justify-content:center;
    }
    .s-img-wrap img{
      max-width:100%;max-height:100%;object-fit:contain;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.14));
    }
    .s-img-ph{font-size:72px;opacity:.18}
    .s-pedestal{
      width:220px;height:22px;margin-top:-6px;
      background:linear-gradient(180deg,rgba(201,150,58,.12) 0%,transparent 100%);
      border-top:1.5px solid rgba(201,150,58,.25);
      border-radius:50% 50% 0 0/100% 100% 0 0;
    }
    .s-info{margin-top:14px}
    .s-pname{font-size:20px;font-weight:800;color:var(--black);line-height:1.2}
    .s-pdesc{font-size:11px;color:var(--gray);margin-top:5px;line-height:1.4;max-width:360px}
    .s-marca{font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
    .s-price{
      display:inline-block;background:var(--black);color:var(--gold-l);
      font-size:19px;font-weight:800;
      padding:5px 18px;border-radius:22px;margin-top:10px;
    }
    .s-sku{font-size:9.5px;color:#aaa;margin-top:4px}

    /* bottom bar */
    .s-footer{
      position:absolute;bottom:0;left:0;right:0;z-index:6;
      background:var(--black);height:68px;
      display:flex;align-items:center;
    }
    .s-feat{
      flex:1;text-align:center;padding:6px;
      border-right:1px solid rgba(255,255,255,.08);
      display:flex;flex-direction:column;align-items:center;gap:2px;
    }
    .s-feat:last-child{border-right:none}
    .s-feat-ico{font-size:17px;color:var(--gold)}
    .s-feat-lbl{color:rgba(255,255,255,.65);font-size:7.5px;font-weight:700;
      text-transform:uppercase;letter-spacing:.4px;line-height:1.3}

    /* LOADING */
    .loading{padding:72px 40px;text-align:center;color:#aaa}
    .spin{
      width:38px;height:38px;border-radius:50%;
      border:3px solid rgba(201,150,58,.2);border-top-color:var(--gold);
      animation:rot .75s linear infinite;margin:0 auto 14px;
    }
    @keyframes rot{to{transform:rotate(360deg)}}

    /* ── PRINT ── */
    @media print{
      @page{margin:0;size:A4 portrait}
      *{
        print-color-adjust:exact !important;
        -webkit-print-color-adjust:exact !important;
      }
      html,body{background:white !important;margin:0;padding:0}
      .action-bar{display:none !important}
      .doc{
        max-width:100%;margin:0;box-shadow:none;border-radius:0;
        min-height:297mm;
        display:flex !important;flex-direction:column !important;
      }
      .products-area{flex:1 !important}
      /* forzar estructura del header */
      .doc-header{display:grid !important;grid-template-columns:220px 1fr !important}
      .dh-left{display:flex !important}
      .dh-left::after{display:block !important}
      /* forzar 4 columnas en grids */
      .pgrid{display:grid !important;grid-template-columns:repeat(4,1fr) !important;gap:10px !important}
      .doc-features{display:grid !important;grid-template-columns:repeat(4,1fr) !important;padding:14px 24px}
      .doc-strip{display:flex !important}
      .pcard{break-inside:avoid;page-break-inside:avoid}
      .pcard-btn{display:none !important}
      .products-area{padding:20px 24px 4px}
      .doc-contact{padding:10px 24px}

      /* catalog PDF: hide modal */
      body:not(.print-single) .s-modal{display:none !important}

      /* single product PDF */
      body.print-single .doc{display:none !important}
      body.print-single .s-modal{
        position:fixed !important;inset:0 !important;
        background:white !important;z-index:9999 !important;
        display:flex !important;align-items:center !important;justify-content:center !important;
        print-color-adjust:exact !important;-webkit-print-color-adjust:exact !important;
      }
      body.print-single .s-actions{display:none !important}
      body.print-single .s-card{
        width:100vmin !important;height:100vmin !important;
        box-shadow:none !important;
      }
    }

    @media(max-width:860px){
      .pgrid{grid-template-columns:repeat(2,1fr)}
      .doc-header,.dh-right{flex-direction:column}
      .doc-features{grid-template-columns:repeat(2,1fr)}
      .doc-header{grid-template-columns:1fr}
      .dh-left::after{display:none}
      .dh-right{padding:24px}
      .s-card{width:96vw;height:96vw}
    }
  </style>
</head>
<body>

<!-- Action bar -->
<div class="action-bar">
  <div class="ab-left">
    <img class="ab-logo" src="https://raw.githubusercontent.com/amexportsp-byte/data_imagen/main/logo1.png" alt="A&M"/>
    <div>
      <div class="ab-title">Catálogo de Productos</div>
      <div class="ab-sub" id="abSub">Cargando productos…</div>
    </div>
  </div>
  <div class="ab-right">
    <button class="btn btn-outline" onclick="location.href='inicio.html'">✕ Cerrar</button>
    <button class="btn btn-gold" onclick="printCatalog()">⬇ Descargar PDF</button>
  </div>
</div>

<!-- Documento catálogo -->
<div class="doc" id="doc">
  <div class="loading" id="loadingEl">
    <div class="spin"></div>
    <p style="font-size:14px;font-weight:600;color:#555">Cargando catálogo…</p>
    <p style="margin-top:6px;font-size:11.5px">Obteniendo productos y precios actualizados</p>
  </div>
</div>

<!-- Modal producto individual -->
<div class="s-modal" id="sModal">
  <div class="s-wrap">
    <div class="s-actions">
      <button class="s-btn s-btn-close" onclick="closeSingle()">✕ Cerrar</button>
      <button class="s-btn s-btn-print" onclick="printSingle()">⬇ Descargar PDF</button>
    </div>
    <div class="s-card" id="sCard"></div>
  </div>
</div>

<script>
const LOGO = 'https://raw.githubusercontent.com/amexportsp-byte/data_imagen/main/logo1.png';
const today = new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'});

// product store (id → object) to avoid JSON-in-attribute issues
const pStore = new Map();

const CAT_ICO = {
  default:'📦',
  tecnolog:'💻',electron:'⚡',comput:'💻',
  hogar:'🏠',cocin:'🍳',muebl:'🛋️',
  viaj:'🧳',
  mod:'👗',rop:'👗',calzad:'👟',bolsos:'👜',
  deport:'🏋️',ejercic:'🏋️',
  belleza:'💆',cosmet:'💆',
  juguet:'🎮',niños:'🎮',
  salud:'❤️',
  aliment:'🛒',
  mascot:'🐾',
  herramient:'🔧',
  jardin:'🌱',
  accesorio:'💍',joyeria:'💍',
};

function catIco(cat){
  if(!cat) return CAT_ICO.default;
  const k=cat.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  for(const [p,v] of Object.entries(CAT_ICO)){
    if(k.includes(p)) return v;
  }
  return CAT_ICO.default;
}

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadCatalog(){
  try{
    const [rawProducts, rates] = await Promise.all([
      fetch('/api/products').then(r=>r.json()),
      fetch('/api/exchange-rates').then(r=>r.json()).catch(()=>[]),
    ]);

    // Si auth falla la ruta privada devuelve objeto; intentar la pública
    let products = Array.isArray(rawProducts) ? rawProducts : null;
    if(!products){
      const pub = await fetch('/api/products/public').then(r=>r.json());
      products = Array.isArray(pub) ? pub : [];
    }

    // Normalizar campos (privado usa `info`, público usa `descripcion`)
    products = products.map(p=>({
      ...p,
      info: p.info || p.descripcion || '',
    }));

    // Filtrar: stock > 0 Y no inactivo/oculto
    const active = products.filter(p=>
      parseInt(p.stock||0) > 0 &&
      p.status !== 'inactivo' &&
      p.status !== 'oculto'
    );

    document.getElementById('abSub').textContent =
      `${active.length} productos disponibles · ${today}`;

    // Agrupar por categoría
    const byCat = {};
    active.forEach(p=>{
      const cat = p.categoria || 'Sin categoría';
      if(!byCat[cat]) byCat[cat]=[];
      byCat[cat].push(p);
      pStore.set(p.id, p);
    });

    document.getElementById('doc').innerHTML =
      renderHeader(active.length) +
      renderBody(byCat) +
      renderFooter();

  }catch(err){
    document.getElementById('doc').innerHTML=`
      <div class="loading">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <p style="font-size:14px;font-weight:700;color:#c00">Error al cargar catálogo</p>
        <p style="font-size:11.5px;margin-top:6px;color:#aaa">${esc(err.message)}</p>
        <button onclick="loadCatalog()" style="margin-top:16px;padding:9px 22px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-family:Outfit,sans-serif;font-size:13px;font-weight:700;cursor:pointer">↻ Reintentar</button>
      </div>`;
  }
}

function renderHeader(total){
  return `
  <div class="doc-header">
    <div class="dh-left">
      <img class="dh-logo" src="${LOGO}" alt="A&M" onerror="this.style.display='none'"/>

      <div class="dh-bar"></div>
    </div>
    <div class="dh-right">
      <div class="dh-eyebrow">Catálogo Oficial ${new Date().getFullYear()}</div>

      </div>
    </div>
  </div>
  <div class="doc-strip">
    <div class="strip-item"><strong>Fecha</strong>${today}</div>
    <div class="strip-item"><strong>Total productos</strong>${total} artículos</div>
    <div class="strip-item"><strong>Empresa</strong>A&amp;M Importaciones</div>
    <div class="strip-item"><strong>Vigencia</strong>Sujeto a disponibilidad</div>
  </div>`;
}

function renderBody(byCat){
  return `<div class="products-area">` +
    Object.entries(byCat).map(([cat,prods])=>`
      <div class="cat-row">
        <div class="cat-row-name">
          <div class="cat-ico">${catIco(cat)}</div>
          ${esc(cat)}
        </div>
        <span class="cat-count">${prods.length} producto${prods.length!==1?'s':''}</span>
        <div class="cat-line"></div>
      </div>
      <div class="pgrid">
        ${prods.map(p=>renderCard(p)).join('')}
      </div>
    `).join('') +
  `</div>`;
}

function renderCard(p){
  const price = parseFloat(p.precioVenta||0);
  const cat   = p.categoria||'Sin categoría';
  const img   = p.imageUrl||'';
  const imgH  = img
    ? `<img src="${esc(img)}" alt="${esc(p.nombre)}" onerror="this.parentElement.innerHTML='<span class=ph>📦</span>'"/>`
    : `<span class="ph">📦</span>`;

  return `
  <div class="pcard" data-pid="${p.id}" onclick="openSingle(${p.id})">
    <div class="pcard-cat"><span class="ico">${catIco(cat)}</span>${esc(cat)}</div>
    <div class="pcard-img">${imgH}</div>
    <div class="pcard-body">
      <div class="pcard-name">${esc(p.nombre)}</div>
      ${p.info?`<div class="pcard-desc">${esc(p.info)}</div>`:''}
      ${p.codigo?`<div class="pcard-sku">SKU: ${esc(p.codigo)}</div>`:''}
      <div class="pcard-bottom">
        <div class="pcard-price">S/ ${price.toFixed(2)}</div>
        <button class="pcard-btn" onclick="event.stopPropagation();openSingle(${p.id})">🛒</button>
      </div>
    </div>
  </div>`;
}

function renderFooter(){
  return `
  <div class="doc-features">
    <div class="feat">
      <span class="feat-ico">🏆</span>
      <span class="feat-title">Garantía</span>
      <div class="feat-desc">Todos nuestros productos cuentan con garantía</div>
    </div>
    <div class="feat">

    <div class="feat">
      <span class="feat-ico">💳</span>

    </div>
  </div>
  <div class="doc-contact">
    <div class="contact-list">
      <div class="contact-item">📞 <strong>+504 9999-9999</strong></div>
      <div class="contact-item">✉️ info@amimportaciones.com</div>
      <div class="contact-item">📍 San Pedro Sula, Honduras</div>
    </div>
    <div>
      <div class="social-row">
        <div class="sico">f</div>
        <div class="sico" style="font-size:9px">ig</div>
        <div class="sico">W</div>
        <div class="sico" style="font-size:9px">tk</div>
        <span class="social-handle">@amimportaciones</span>

    </div>
    <div class="brand-block">

      <div class="brand-slogan">Tu mejor elección, nuestra prioridad.</div>
    </div>
  </div>`;
}

/* ── SINGLE PRODUCT ── */
function openSingle(id){
  const p = pStore.get(id);
  if(!p) return;
  renderSingle(p);
  document.getElementById('sModal').classList.add('open');
}

function closeSingle(){
  document.getElementById('sModal').classList.remove('open');
}

function renderSingle(p){
  const price = parseFloat(p.precioVenta||0);
  const cat   = p.categoria||'Sin categoría';
  const img   = p.imageUrl||'';
  const imgH  = img
    ? `<img src="${esc(img)}" alt="${esc(p.nombre)}" onerror="this.parentElement.innerHTML='<span class=s-img-ph>📦</span>'"/>`
    : `<span class="s-img-ph">📦</span>`;

  document.getElementById('sCard').innerHTML = `
    <div class="s-bg"></div>
    <div class="s-arc s-arc-1"></div>
    <div class="s-arc s-arc-2"></div>
    <div class="s-arc s-arc-3"></div>
    <div class="s-arc s-arc-4"></div>

    <div class="s-corner">
      <img class="s-corner-logo" src="${LOGO}" alt="A&M" onerror="this.style.display='none'"/>
      <div class="s-corner-name">A&amp;M Importaciones</div>
      <div class="s-corner-tag">Calidad · Confianza · Variedad</div>
    </div>

    <div class="s-top-icons">
      <span class="s-top-ico">🛡️</span>
      <div class="s-top-sep"></div>
      <span class="s-top-ico">🔒</span>
      <div class="s-top-sep"></div>
      <span class="s-top-ico">🚛</span>
    </div>

    <div class="s-diamond" style="top:76px;left:50%;transform:translateX(-50%)">◆</div>

    <div class="s-content">
      <div class="s-cat-pill">${catIco(cat)} ${esc(cat)}</div>
      <div class="s-img-wrap">${imgH}</div>
      <div class="s-pedestal"></div>
      <div class="s-info">
        <div class="s-pname">${esc(p.nombre)}</div>
        ${p.info?`<div class="s-pdesc">${esc(p.info)}</div>`:''}
        ${p.marca?`<div class="s-marca">${esc(p.marca)}</div>`:''}
        <div class="s-price">S/ ${price.toFixed(2)}</div>
        ${p.codigo?`<div class="s-sku">SKU: ${esc(p.codigo)}</div>`:''}
      </div>
    </div>

    <div class="s-footer">
      <div class="s-feat"><span class="s-feat-ico">🏆</span><span class="s-feat-lbl">Calidad<br>Garantizada</span></div>
      <div class="s-feat"><span class="s-feat-ico">🔒</span><span class="s-feat-lbl">Pagos<br>Seguros</span></div>
      <div class="s-feat"><span class="s-feat-ico">🚛</span><span class="s-feat-lbl">Envíos a<br>todo el país</span></div>
      <div class="s-feat"><span class="s-feat-ico">🎧</span><span class="s-feat-lbl">Atención<br>Personalizada</span></div>
    </div>`;
}

function printCatalog(){
  document.body.classList.remove('print-single');
  window.print();
}

function printSingle(){
  document.body.classList.add('print-single');
  window.print();
  setTimeout(()=>document.body.classList.remove('print-single'), 1200);
}

loadCatalog();
</script>
